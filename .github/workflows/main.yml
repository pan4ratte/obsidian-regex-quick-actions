name: Build, Attest, and Release

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      id-token: write      # Required for attestation signing
      contents: write      # Required to create the GitHub Release
      attestations: write  # Required to write the attestation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Set up the Node.js environment on the GitHub server
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'       # Automatically caches dependencies to make future builds faster

      # Step 2: Install plugin's dependencies
      - name: Install dependencies
        run: npm ci

      # Step 3: Run npm build command
      - name: Build plugin
        run: npm run build

      # Step 4: Attest the files generated by build script
      - name: Attest plugin files
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      # Step 5: Create the GitHub Release and attach the attested files
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
